<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡｡Eternity.✨</title>
    <link href="https://cdn.jsdelivr.net/npm/semantic-ui-css@2.5.0/semantic.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.4.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui-css@2.5.0/semantic.min.js"></script>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #1a0033, #2a1b5f, #00b4ff, #7b2fff) fixed;
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #fff;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ==================== 精致音乐按钮（左上角） ==================== */
        #music-control {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 1001;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25),
                        inset 0 2px 8px rgba(255, 255, 255, 0.15);
        }

        #music-control:hover {
            transform: scale(1.12);
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        /* 播放图标（三角形） */
        #music-control.play::before {
            content: '';
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 11px solid #fff;
            margin-left: 2px;
        }

        /* 暂停图标（两条竖线） */
        #music-control.pause {
            display: flex;
            gap: 5px;
        }
        #music-control.pause::before,
        #music-control.pause::after {
            content: '';
            width: 3px;
            height: 14px;
            background: #fff;
            border-radius: 2px;
        }

        .snowflake {
            position: fixed;
            top: -10px;
            color: #ffffff;
            font-size: 10px;
            animation: fall linear infinite;
            opacity: 0.8;
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        @keyframes fall {
            0% { transform: translateX(0px) translateY(0px) rotate(0deg); opacity: 0.8; }
            50% { transform: translateX(30px) translateY(50vh) rotate(180deg); }
            100% { transform: translateX(-30px) translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .control-panel {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        }

        #theme-toggle {
            position: fixed;
            right: 20px;
            top: 22%;
            background: transparent;
            border: 3px solid rgba(255,255,255,0.55);
            color: white;
            padding: 9px;
            font-size: 19px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- 精致音乐按钮（左上角） -->
    <div id="music-control" class="play" title="点击播放 / 暂停音乐"></div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="https://streamshare.wireway.ch/download/yt5oyld9" type="audio/mpeg">
    </audio>

    <div class="control-panel">
        <button id="toggleSnow">Disable Snow</button>
    </div>

    <button id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>

    <header>
        <!-- 你的 header 部分保持不变 -->
        <div id="head" class="ui inverted vertical masthead center aligned segment">
            <div id="nav" class="ui container">
                <div class="ui large secondary inverted menu">
                    <div class="item">
                        <p id="hitokoto">条条大路通罗马</p>
                    </div>
                </div>
            </div>
            <div id="title" class="ui text container">
                <h1 class="ui inverted header">
                    <i class="spinner icon"></i>
                    <div class="content">
                        ♡｡Eternity.✨
                        <div class="sub header">For Xylonstar</div>
                    </div>
                </h1>
                <!-- 搜索框等保持原样 -->
                <div class="ui left corner labeled right icon fluid large input">
                    <div class="ui left corner label">
                        <img id="search-fav" class="left floated avatar ui image" src="https://www.google.com/favicon.ico">
                    </div>
                    <input id="searchinput" type="search" placeholder="come on……" autocomplete="off">
                    <i class="inverted circular search link icon"></i>
                </div>
                <div id="sengine" class="ui bottom attached tabular inverted secondary menu">
                    <div class="header item">&nbsp;</div>
                    <a class="active item" data-url="https://www.google.com/search?q=$s">Google</a>
                    <a class="item" data-url="https://www.bing.com/search?q=$s">Bing</a>
                    <a class="item" data-url="https://www.sogou.com/web?query=$s">Sogou</a>
                    <a class="item" data-url="https://www.baidu.com/s?wd=$s">Baidu</a>
                </div>
            </div>
        </div>
    </header>

    <main style="width: 100%; max-width: 2160px; margin: 0 auto;">
        <div class="ui container">
            <!-- 这里粘贴你原来的 TVbox download、interface、Watch movies online 三个段落内容 -->
            <!-- ... 你的卡片内容 ... -->

            <!-- 联系方式 -->
            <div class="ui basic segment" style="text-align: center; margin-top: 30px;">
                <h4 class="ui horizontal divider header"><i class="telegram plane icon"></i> Contact</h4>
                <a href="https://t.me/Eternity0006" target="_blank" class="ui large teal button">
                    <i class="telegram plane icon"></i> Telegram: @Eternity0006
                </a>
            </div>
        </div>
    </main>

    <script>
        // ==================== 音乐控制（优化版） ====================
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('music-control');
        let isPlaying = false;

        audio.volume = 0.45;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                musicBtn.classList.remove('pause');
                musicBtn.classList.add('play');
            } else {
                audio.play().then(() => {
                    musicBtn.classList.remove('play');
                    musicBtn.classList.add('pause');
                }).catch(() => {});
            }
            isPlaying = !isPlaying;
        }

        musicBtn.addEventListener('click', toggleMusic);

        // 页面加载后自动尝试播放
        window.addEventListener('load', () => {
            audio.play().then(() => {
                isPlaying = true;
                musicBtn.classList.remove('play');
                musicBtn.classList.add('pause');
            }).catch(() => {
                musicBtn.classList.add('play');
            });
        });

        // ==================== 雪花、暗黑模式、搜索等保持不变 ====================
        // （雪花动画代码、暗黑模式、搜索功能与之前版本一致，这里省略以节省空间）
        // 请把你之前版本中的雪花、toggleSnow、theme-toggle、搜索脚本完整复制粘贴到这里

        const snowflakeCharacters = ["❄", "❅", "❆", "✻", "✼", "✽"];
        let snowflakeInterval = null;
        let snowEnabled = true;
        let currentSnowflakeCount = 0;
        const MAX_SNOWFLAKES = 100;

        function createSnowflake() {
            if (currentSnowflakeCount >= MAX_SNOWFLAKES) return;
            const snowflake = document.createElement("div");
            snowflake.className = "snowflake";
            snowflake.textContent = snowflakeCharacters[Math.floor(Math.random() * snowflakeCharacters.length)];
            snowflake.style.left = Math.random() * 100 + "vw";
            snowflake.style.animationDuration = 5 + Math.random() * 7 + "s";
            snowflake.style.fontSize = 12 + Math.random() * 20 + "px";
            document.body.appendChild(snowflake);
            currentSnowflakeCount++;

            snowflake.addEventListener("animationend", () => {
                snowflake.remove();
                currentSnowflakeCount--;
            });
        }

        function initializeSnowflakes(count) {
            snowflakeInterval = setInterval(() => {
                for (let i = 0; i < count; i++) createSnowflake();
            }, 400);
        }

        function clearSnowflakes() {
            document.querySelectorAll(".snowflake").forEach(s => s.remove());
            currentSnowflakeCount = 0;
        }

        function toggleSnow() {
            snowEnabled = !snowEnabled;
            if (snowEnabled) {
                const isMobile = window.innerWidth <= 768;
                initializeSnowflakes(isMobile ? 1 : 2);
                document.getElementById("toggleSnow").textContent = "Disable Snow";
            } else {
                clearInterval(snowflakeInterval);
                clearSnowflakes();
                document.getElementById("toggleSnow").textContent = "Enable Snow";
            }
        }

        const isMobile = window.innerWidth <= 768;
        initializeSnowflakes(isMobile ? 1 : 2);
        document.getElementById("toggleSnow").addEventListener("click", toggleSnow);

        // 暗黑模式
        (function() {
            if (window.themeInitialized) return;
            window.themeInitialized = true;
            document.addEventListener('DOMContentLoaded', function() {
                const currentTheme = localStorage.getItem('theme');
                if (currentTheme === 'dark') document.body.classList.add('dark-mode');

                const themeToggleButton = document.getElementById('theme-toggle');
                themeToggleButton.addEventListener('click', function() {
                    document.body.classList.toggle('dark-mode');
                    if (document.body.classList.contains('dark-mode')) {
                        localStorage.setItem('theme', 'dark');
                        themeToggleButton.textContent = '🌕';
                    } else {
                        localStorage.setItem('theme', 'light');
                        themeToggleButton.textContent = '🌙';
                    }
                });
            });
        })();

        // 搜索功能
        $('#sengine a').on('click', function(e) {
            $('#sengine a.active').toggleClass('active');
            $(e.target).toggleClass('active');
            $('#search-fav').attr('src', $(e.target).data('url').match(/https{0,1}:\/\/\S+\//)[0] + '/favicon.ico');
        });

        $('.search').on('click', function() {
            var url = $('#sengine a.active').data('url');
            url = url.replace(/\$s/, $('#searchinput').val());
            window.open(url);
        });

        $("#searchinput").bind("keypress", function(e) {
            if (e.keyCode == 13) $(".search").click();
        });
    </script>

    <!-- Hitokoto -->
    <script src="https://v1.hitokoto.cn/?encode=js&select=%23hitokoto" defer></script>

    <!-- Sakana Widget -->
    <div id="sakana-widget" style="position: fixed; bottom: 20px; right: 40px;"></div>
    <script>
        function initSakanaWidget() {
            new SakanaWidget({ autoFit: true }).setState({ i: 0.001, d: 1 }).mount('#sakana-widget');
        }
    </script>
    <script async onload="initSakanaWidget()" src="https://cdn.jsdelivr.net/npm/sakana-widget@2.2.2/lib/sakana.min.js"></script>

</body>
</html>
