        body {

            color: #fff;

            min-height: 100vh;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 音乐按钮 - 圆形 + ♫ 图标 */
        #music-control {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 1001;
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(16px);
            border: 1.8px solid rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 22px rgba(0, 0, 0, 0.35), 
                        inset 0 2px 10px rgba(255,255,255,0.25);
        }

        #music-control:hover {
            transform: scale(1.12);
            background: rgba(255,255,255,0.28);
        }

        /* 暂停状态 */
        #music-control.pause {
            font-size: 22px;
        }

        .snowflake {
            position: fixed;
            top: -10px;
            color: #ffffff;
            font-size: 13px;
            animation: fall linear infinite;
            opacity: 0.9;
            text-shadow: 0 0 12px rgba(255,255,255,0.95);
        }

        @keyframes fall {
            0% { transform: translateX(0px) translateY(0px) rotate(0deg); }
            50% { transform: translateX(35px) translateY(50vh) rotate(180deg); }
            100% { transform: translateX(-35px) translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .control-panel {
            position: fixed;
            top: 18px;
            right: 78px;
            z-index: 1000;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 10px;

        #theme-toggle {
            position: fixed;
            right: 18px;
            top: 18px;
            z-index: 1002;
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.25);
        }
    </style>

    <script>
        // 音乐控制（♫ 图标）
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('music-control');
        let isPlaying = false;
        audio.volume = 0.45;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                musicBtn.textContent = '♫';
                musicBtn.classList.remove('pause');
            } else {
                audio.play().catch(() => {});
                musicBtn.textContent = '⏸';
                musicBtn.classList.add('pause');
            }
            isPlaying = !isPlaying;
        }

        musicBtn.addEventListener('click', toggleMusic);

        // 页面加载自动尝试播放
        window.addEventListener('load', () => {
            audio.play().then(() => {
                isPlaying = true;
                musicBtn.textContent = '⏸';
                musicBtn.classList.add('pause');
            }).catch(() => {
                musicBtn.textContent = '♫';
            });
        });

        // 雪花（密度较大）
        const snowflakeCharacters = ["❄", "❅", "❆", "✻", "✼", "✽"];
        let snowflakeInterval = null;
        let snowEnabled = true;
        let currentSnowflakeCount = 0;
        const MAX_SNOWFLAKES = 120;

        function createSnowflake() {
            if (currentSnowflakeCount >= MAX_SNOWFLAKES) return;
            const snowflake = document.createElement("div");
            snowflake.className = "snowflake";
            snowflake.textContent = snowflakeCharacters[Math.floor(Math.random() * snowflakeCharacters.length)];
            snowflake.style.left = Math.random() * 100 + "vw";
            snowflake.style.animationDuration = (4 + Math.random() * 7) + "s";
            snowflake.style.fontSize = (11 + Math.random() * 20) + "px";
            document.body.appendChild(snowflake);
            currentSnowflakeCount++;

            snowflake.addEventListener("animationend", () => {
                snowflake.remove();
                currentSnowflakeCount--;
            });
        }

        function initializeSnowflakes(count) {
            snowflakeInterval = setInterval(() => {
                for (let i = 0; i < count; i++) createSnowflake();
            }, 280);
        }

        function toggleSnow() {
            snowEnabled = !snowEnabled;
            if (snowEnabled) {
                const isMobile = window.innerWidth <= 768;
                initializeSnowflakes(isMobile ? 2 : 4);
                document.getElementById("toggleSnow").textContent = "Disable Snow";
            } else {
                clearInterval(snowflakeInterval);
                document.querySelectorAll(".snowflake").forEach(s => s.remove());
                currentSnowflakeCount = 0;
                document.getElementById("toggleSnow").textContent = "Enable Snow";
            }
        }

        const isMobile = window.innerWidth <= 768;
        initializeSnowflakes(isMobile ? 2 : 4);
        document.getElementById("toggleSnow").addEventListener("click", toggleSnow);

        // 暗黑模式
        (function() {
            if (window.themeInitialized) return;
            window.themeInitialized = true;
            document.addEventListener('DOMContentLoaded', function() {
                const currentTheme = localStorage.getItem('theme');
                if (currentTheme === 'dark') document.body.classList.add('dark-mode');

                const themeToggleButton = document.getElementById('theme-toggle');
                themeToggleButton.addEventListener('click', function() {
                    document.body.classList.toggle('dark-mode');
                    if (document.body.classList.contains('dark-mode')) {
                        localStorage.setItem('theme', 'dark');
                        themeToggleButton.textContent = '☀️';
                    } else {
                        localStorage.setItem('theme', 'light');
                        themeToggleButton.textContent = '🌙';
                    }
                });
            });
        })();

        // 搜索功能
        $('#sengine a').on('click', function(e) {
            $('#sengine a.active').toggleClass('active');
            $(e.target).toggleClass('active');
            $('#search-fav').attr('src', $(e.target).data('url').match(/https{0,1}:\/\/\S+\//)[0] + '/favicon.ico');
        });

        $('.search').on('click', function() {
            var url = $('#sengine a.active').data('url');
            url = url.replace(/\$s/, $('#searchinput').val());
            window.open(url);
        });

        $("#searchinput").bind("keypress", function(e) {
            if (e.keyCode == 13) $(".search").click();
        });
    </script>
