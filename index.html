    <script>
        // ==================== 雪花效果（移动端优化） ====================
        const snowflakeCharacters = ["❄", "❅", "❆", "✻", "✼", "✽"];
        let snowflakeInterval = null;
        let snowEnabled = true;
        let currentSnowflakeCount = 0;
        const MAX_SNOWFLAKES = 150;   // 移动端降低上限防止卡顿

        function createSnowflake() {
            if (currentSnowflakeCount >= MAX_SNOWFLAKES) return;
            const snowflake = document.createElement("div");
            snowflake.className = "snowflake";
            snowflake.textContent = snowflakeCharacters[Math.floor(Math.random() * snowflakeCharacters.length)];
            snowflake.style.left = Math.random() * 100 + "vw";
            snowflake.style.animationDuration = 4 + Math.random() * 6 + "s";
            snowflake.style.fontSize = 12 + Math.random() * 22 + "px";
            document.body.appendChild(snowflake);
            currentSnowflakeCount++;

            snowflake.addEventListener("animationend", () => {
                snowflake.remove();
                currentSnowflakeCount--;
            });
        }

        function initializeSnowflakes(count) {
            snowflakeInterval = setInterval(() => {
                for (let i = 0; i < count; i++) createSnowflake();
            }, 350);
        }

        function clearSnowflakes() {
            document.querySelectorAll(".snowflake").forEach(s => s.remove());
            currentSnowflakeCount = 0;
        }

        function toggleSnow() {
            snowEnabled = !snowEnabled;
            if (snowEnabled) {
                const isMobile = window.innerWidth <= 768;
                const count = isMobile ? 2 : 4;   // 移动端更温和
                initializeSnowflakes(count);
                document.getElementById("toggleSnow").textContent = "Disable Snow";
            } else {
                clearInterval(snowflakeInterval);
                clearSnowflakes();
                document.getElementById("toggleSnow").textContent = "Enable Snow";
            }
        }

        // 初始化雪花
        const isMobile = window.innerWidth <= 768;
        initializeSnowflakes(isMobile ? 2 : 4);
        document.getElementById("toggleSnow").addEventListener("click", toggleSnow);

        // ==================== 主题切换 ====================
        (function() {
            if (window.themeInitialized) return;
            window.themeInitialized = true;

            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark') document.body.classList.add('dark-mode');

            document.getElementById('theme-toggle').addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                if (document.body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    this.textContent = '🌕';
                } else {
                    localStorage.setItem('theme', 'light');
                    this.textContent = '🌙';
                }
            });
        })();

        // ==================== 音乐播放 ====================
        const musicBtn = document.getElementById('music-btn');
        const audio = document.getElementById('bg-music');
        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                musicBtn.classList.remove('playing');
                musicBtn.textContent = '🎵';
            } else {
                audio.play().catch(() => {});
                musicBtn.classList.add('playing');
                musicBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        });

        // ==================== 搜索功能 ====================
        $('#sengine a').on('click', function(e) {
            $('#sengine a.active').removeClass('active');
            $(this).addClass('active');
            const base = $(this).data('url').match(/https?:\/\/[^/]+/)[0];
            $('#search-fav').attr('src', base + '/favicon.ico');
        });

        $("#searchinput").on("keypress", function(e) {
            if (e.keyCode === 13) {
                const activeUrl = $('#sengine a.active').data('url');
                if (activeUrl) {
                    const url = activeUrl.replace(/\$s/, encodeURIComponent($(this).val()));
                    window.open(url, '_blank');
                }
            }
        });

    </script>
